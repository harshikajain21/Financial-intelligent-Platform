version: "3.9"

services:
  # ── Financial Intelligence Platform API ───────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fip_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fip_user:fip_password@postgres:5432/fip_db
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fip_network

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fip_postgres
    environment:
      POSTGRES_USER: fip_user
      POSTGRES_PASSWORD: fip_password
      POSTGRES_DB: fip_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fip_user -d fip_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fip_network

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fip_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fip_network

  # ── pgAdmin (optional development UI) ─────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fip_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fip.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev
    networks:
      - fip_network

volumes:
  postgres_data:
  redis_data:

networks:
  fip_network:
    driver: bridge
